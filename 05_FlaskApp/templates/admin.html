{% extends "base.html" %}
{% block title %}Admin Panel — SecureApp{% endblock %}
{% block content %}
<div class="page-container">
    <div class="card">
        <h2>🛡️ Admin Panel</h2>
        <p>Restricted to administrators only.</p>
        <h3>Registered Users</h3>
        <table class="user-table">
            <thead>
                <tr><th>ID</th><th>Username</th><th>Role</th></tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user[0] }}</td>
                    <td>{{ user[1] }}</td>
                    <td><span class="role-badge role-{{ user[2] }}">{{ user[2] }}</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
